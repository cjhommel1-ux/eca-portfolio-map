  m.bindPopup("<b>"+d[0]+"</b><br>"+d[1]+", "+d[2]+"<br>"+units+" units &middot; "+TYPE.names[d[4]]+
    "<br><span style=color:#666>"+d[9]+"</span><br>Market: "+d[8]+
    "<br>Metro 5-yr growth: <b style=color:"+growthColor(d[7])+">"+gtxt+"</b>");
  m.bindTooltip(d[0]+" ("+units+")");
  m._d=d; markers.push(m); m.addTo(map); bounds.push([lat,lon]);
});
map.fitBounds(bounds,{padding:[30,30]});
function visible(d){return mode==="type"?typeOn[d[4]]:true;}
function paint(){markers.forEach(function(m){var d=m._d;
  if(!visible(d)){map.removeLayer(m);return;} if(!map.hasLayer(m))m.addTo(map);
  m.setStyle({fillColor: mode==="growth"?growthColor(d[7]):TYPE.colors[d[4]]});});}
paint();
var ctl=L.control({position:"topright"});
ctl.onAdd=function(){
  var div=L.DomUtil.create("div","panel"); L.DomEvent.disableClickPropagation(div);
  var tot=DEALS.length, units=DEALS.reduce(function(a,d){return a+d[3];},0);
  div.innerHTML='<h4>ECA Portfolio</h4><div style="color:#777;font-size:12px">'+tot+' deals &middot; '+units.toLocaleString()+' units</div>'+
    '<div class="seg"><button id="bG" class="on">Color: growth</button><button id="bT">Color: type</button></div><div id="leg"></div>';
  setTimeout(function(){
    document.getElementById("bG").onclick=function(){mode="growth";this.classList.add("on");document.getElementById("bT").classList.remove("on");paint();legend();};
    document.getElementById("bT").onclick=function(){mode="type";this.classList.add("on");document.getElementById("bG").classList.remove("on");paint();legend();};
    legend();
  },0);
  return div;
};
ctl.addTo(map);
function legend(){
  var leg=document.getElementById("leg"); if(!leg)return;
  var html="", cnt={}, un={};
  DEALS.forEach(function(d){cnt[d[4]]=(cnt[d[4]]||0)+1;un[d[4]]=(un[d[4]]||0)+d[3];});
  if(mode==="growth"){
    GB.names.forEach(function(n,i){
      if(i===4 && !DEALS.some(function(d){return d[7]===null;})) return;
      html+='<div class="row"><span class="dot" style="background:'+GB.colors[i]+'"></span>'+n+'</div>';
    });
  }else{
    TYPE.names.forEach(function(n,i){
      html+='<div class="row'+(typeOn[i]?'':' off')+'" data-g="'+i+'"><span class="dot" style="background:'+TYPE.colors[i]+'"></span>'+n+' &mdash; '+(cnt[i]||0)+' / '+(un[i]||0).toLocaleString()+'u</div>';
    });
  }
  html+='<div style="margin-top:6px;color:#999;font-size:11px">size = unit count<br>growth = Census 2020&rarr;2025 metro</div>';
  leg.innerHTML=html;
  if(mode==="type") leg.querySelectorAll(".row").forEach(function(r){r.onclick=function(){
    var g=+r.getAttribute("data-g"); typeOn[g]=!typeOn[g]; r.classList.toggle("off"); paint();};});
}
</script></body></html>
